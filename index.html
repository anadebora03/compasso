<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0B1526">
<meta name="description" content="Compasso · companheiro de tratamento com análogos de GLP-1. Aplicações, peso, medidas, sintomas e evolução em um diário digital.">
<title>Compasso · Companheiro de tratamento GLP-1</title>

<link rel="manifest" href="manifest.json">

<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png?v=2">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png?v=2">
<link rel="shortcut icon" href="favicon.ico?v=2">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png?v=2">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Compasso">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">

<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app" id="app"></div>

<script>
  /* Ponte entre os módulos js/supabase.js, js/auth.js, js/database.js,
     js/notifications.js e js/insights.js (ESM) e o app.js (script clássico) */
  window.__supabaseReady = new Promise((resolve) => { window.__resolveSupabaseReady = resolve; });
  window.__authReady = new Promise((resolve) => { window.__resolveAuthReady = resolve; });
  window.__databaseReady = new Promise((resolve) => { window.__resolveDatabaseReady = resolve; });
  window.__notificationsReady = new Promise((resolve) => { window.__resolveNotificationsReady = resolve; });
  window.__insightsReady = new Promise((resolve) => { window.__resolveInsightsReady = resolve; });
  window.__timelineReady = new Promise((resolve) => { window.__resolveTimelineReady = resolve; });
  window.__actionplanReady = new Promise((resolve) => { window.__resolveActionplanReady = resolve; });
  window.__licenseReady = new Promise((resolve) => { window.__resolveLicenseReady = resolve; });
</script>
<script src="app.js"></script>
<script type="module" src="js/supabase.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/database.js"></script>
<script type="module" src="js/notifications.js"></script>
<script type="module" src="js/insights.js"></script>
<script type="module" src="js/timeline.js"></script>
<script type="module" src="js/actionplan.js"></script>
<script type="module" src="js/license.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch((err) => console.error('SW falhou:', err));
    });
  }
</script>
</body>
</html>
